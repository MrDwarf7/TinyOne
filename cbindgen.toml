language = "C"
include_guard = "TINYLANG_H"
pragma_once = true
cpp_compat = true
include_version = true
autogen_warning = "/* Generated by cbindgen from the TinyLang C ABI. Do not edit by hand. */"
sys_includes = ["stdint.h", "stdbool.h", "stddef.h"]

[export]
item_types = ["functions"]
include = [
  "tinyone_free_string",
  "tinyone_lex_source_json",
  "tinyone_compile_source_json",
  "tinyone_compile_file_json",
  "tinyone_run_source_json",
  "tinyone_run_file_json",
  "tinyone_run_artifact_json",
  "tinyone_jit_listing_json",
]
